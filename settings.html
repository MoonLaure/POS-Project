<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定</title>
  <link rel="stylesheet" href="shared.css">
  <style data-critical-blue>body{background:#0b5ed7;color:#fff;font-family:Arial,'Microsoft JhengHei',sans-serif;margin:0}</style>
</head>
<body>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <header class="app-header">
    <div class="app-title">系統設定</div>
    <div class="app-subtitle">管理者限定</div>
  </header>
  <main class="screen-grid full-grid">
    <div class="function-card">
      <h3 class="card-title">清除訂單</h3>
      <p class="card-text">只清除訂單紀錄，保留菜單與庫存。</p>
      <button onclick="clearOrders()">清除訂單</button>
    </div>
    <div class="function-card">
      <h3 class="card-title">重置全部資料</h3>
      <p class="card-text">清除登入、訂單、庫存、會員資料。</p>
      <button onclick="resetAll()">重置系統</button>
    </div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
    <div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div><div class="grid-cell empty-cell"></div>
  </main>
  <nav id="bottomNav" class="bottom-nav"></nav>
  <script src="settings.js"></script>
</body>
</html>
