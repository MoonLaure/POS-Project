<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入</title>
  <link rel="stylesheet" href="shared.css">
  <style>body{margin:0;min-height:100vh;font-family:Arial,'Microsoft JhengHei',sans-serif;background:#0b5ed7;color:#fff}.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.login-box{width:min(420px,92vw);background:#084298;border:3px solid rgba(255,255,255,.55);padding:32px;text-align:center;box-shadow:0 16px 45px rgba(0,0,0,.3)}.login-box h1{margin-top:0;font-size:32px}.login-box select,.login-box button{width:100%;padding:14px;font-size:18px;margin-top:14px}.login-box button{background:#fff;color:#084298;border:0;font-weight:900;cursor:pointer}</style>
</head>
<body>
  <script src="data.js"></script>
  <main class="login-wrap">
    <section class="login-box">
      <h1>餐廳系統登入</h1>
      <p>請選擇角色，系統會依照身分開放功能。</p>
      <select id="role">
        <option value="waiter">服務生</option>
        <option value="kitchen">廚房</option>
        <option value="manager">管理者</option>
      </select>
      <button type="button" onclick="login()">進入系統</button>
    </section>
  </main>
  <script>
    function fallbackLogin(){
      const role = document.getElementById("role")?.value;
      if(!role){ alert("請先選擇登入身分"); return; }
      localStorage.setItem("role", role);
      if(role === "waiter") location.href = "order.html";
      else if(role === "kitchen") location.href = "kitchen.html";
      else if(role === "manager") location.href = "inventory.html";
    }
  </script>
  <script src="auth.js"></script>
  <script>if(typeof login !== "function") window.login = fallbackLogin;</script>
</body>
</html>
